<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 130" width="740" height="130"
     role="img" aria-label="pixel2sky package banner">
  <title>pixel2sky — Pixel coordinates ↔ altitude &amp; azimuth</title>

  <!-- Background -->
  <rect width="740" height="130" rx="8" fill="#0f1923"/>

  <!--
    ALL-SKY ICON  —  azimuthal equidistant projection, North up
    Centre: (195, 65)   Horizon radius R = 46 px
    Projection: r = R · (90° − alt) / 90°
    Position:   x = cx + r·sin(az),  y = cy − r·cos(az)

    Centring logic
      Icon left edge : 195 − 46 = 149 px   → left margin ≈ 149 px
      Tagline right  : 270 + ~323 = ~593 px → right margin ≈ 147 px  (symmetric)

    Altitude rings
      alt = 30°  →  r = 46 · 60/90 = 31
      alt = 60°  →  r = 46 · 30/90 = 15

    Star positions (alt °, az °) → r → (x, y)
      A  65  25   r=12.8  → (200, 53)  ← target
      B  40 112   r=25.6  → (219, 75)
      C  22 208   r=35.2  → (179, 96)
      D  54 318   r=18.4  → (183, 51)
      E  76 148   r=6.6   → (199, 71)

    Text
      Title    baseline y=78   (cap top ≈ y=38)
      Subtitle baseline y=110  (visual gap to title bottom ≈ 12 px)
  -->

  <!-- Horizon circle -->
  <circle cx="195" cy="65" r="46" fill="none" stroke="#2d6da4" stroke-width="1.4"/>

  <!-- Altitude rings — dashed -->
  <circle cx="195" cy="65" r="31" fill="none" stroke="#2d6da4" stroke-width="0.65"
          stroke-dasharray="2.5 3"/>
  <circle cx="195" cy="65" r="15" fill="none" stroke="#2d6da4" stroke-width="0.65"
          stroke-dasharray="2.5 3"/>

  <!-- Azimuth lines — N/S and E/W -->
  <line x1="195" y1="19" x2="195" y2="111" stroke="#2d6da4" stroke-width="0.65"/>
  <line x1="149" y1="65" x2="241" y2="65"  stroke="#2d6da4" stroke-width="0.65"/>

  <!-- Cardinal labels -->
  <text x="195" y="12" font-family="system-ui, Arial, sans-serif"
        font-size="8" font-weight="600" text-anchor="middle" fill="#2d6da4">N</text>
  <text x="246" y="68" font-family="system-ui, Arial, sans-serif"
        font-size="8" font-weight="600" text-anchor="start"  fill="#2d6da4">E</text>

  <!-- Stars -->
  <circle cx="200" cy="53" r="1.5" fill="#ffffff"/>
  <circle cx="219" cy="75" r="1.2" fill="#ffffff" opacity="0.72"/>
  <circle cx="179" cy="96" r="1.0" fill="#ffffff" opacity="0.62"/>
  <circle cx="183" cy="51" r="1.3" fill="#ffffff" opacity="0.70"/>
  <circle cx="199" cy="71" r="1.0" fill="#ffffff" opacity="0.58"/>

  <!-- Target star — amber dot + selection ring -->
  <circle cx="200" cy="53" r="1.8" fill="#e09828"/>
  <circle cx="200" cy="53" r="5.2" fill="none" stroke="#e09828" stroke-width="0.9" opacity="0.88"/>

  <!-- TEXT -->
  <text x="270" y="78"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700"
        fill="#e8edf2">pixel<tspan fill="#e09828">2</tspan>sky</text>

  <text x="270" y="110"
        font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="400" letter-spacing="0.2"
        fill="#4a7ea0">Pixel coordinates  ↔  altitude &amp; azimuth</text>

  <!-- Subtle border -->
  <rect width="740" height="130" rx="8" fill="none" stroke="#1c3252" stroke-width="1"/>
</svg>
